<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">GH.FOLIO Dataflow</title>
  <desc id="desc">Dataflow from user input through API fetch and UI rendering to export output.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#000000"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="#ffffff"/>
  <rect x="40" y="40" width="1320" height="680" fill="none" stroke="#000000" stroke-width="4"/>
  <text x="64" y="78" font-family="'Courier New', monospace" font-size="28" font-weight="900" fill="#000000">GH.FOLIO DATAFLOW</text>

  <rect x="90" y="140" width="220" height="110" fill="#000000" stroke="#000000" stroke-width="4"/>
  <text x="116" y="186" font-family="'Courier New', monospace" font-size="18" font-weight="800" fill="#ffffff">1. INPUT</text>
  <text x="116" y="214" font-family="'Courier New', monospace" font-size="14" font-weight="700" fill="#ffffff">GitHub username</text>

  <rect x="360" y="140" width="250" height="110" fill="#f2f2f2" stroke="#000000" stroke-width="4"/>
  <text x="382" y="186" font-family="'Courier New', monospace" font-size="18" font-weight="800">2. VALIDATE</text>
  <text x="382" y="214" font-family="'Courier New', monospace" font-size="14" font-weight="700">format + empty checks</text>

  <rect x="660" y="140" width="250" height="110" fill="#f2f2f2" stroke="#000000" stroke-width="4"/>
  <text x="682" y="186" font-family="'Courier New', monospace" font-size="18" font-weight="800">3. FETCH</text>
  <text x="682" y="214" font-family="'Courier New', monospace" font-size="14" font-weight="700">GitHub API requests</text>

  <rect x="960" y="140" width="300" height="110" fill="#ffe87a" stroke="#000000" stroke-width="4"/>
  <text x="982" y="186" font-family="'Courier New', monospace" font-size="18" font-weight="800">4. RAW DATA</text>
  <text x="982" y="214" font-family="'Courier New', monospace" font-size="14" font-weight="700">profile + repos + stats</text>

  <rect x="190" y="330" width="280" height="120" fill="#c7f5ff" stroke="#000000" stroke-width="4"/>
  <text x="214" y="380" font-family="'Courier New', monospace" font-size="18" font-weight="800">5. NORMALIZE</text>
  <text x="214" y="410" font-family="'Courier New', monospace" font-size="14" font-weight="700">shape, sort, deduplicate</text>

  <rect x="540" y="330" width="320" height="120" fill="#c7f5ff" stroke="#000000" stroke-width="4"/>
  <text x="564" y="380" font-family="'Courier New', monospace" font-size="18" font-weight="800">6. TRANSFORM</text>
  <text x="564" y="410" font-family="'Courier New', monospace" font-size="14" font-weight="700">derive language mix + cards</text>

  <rect x="930" y="330" width="330" height="120" fill="#c7f5ff" stroke="#000000" stroke-width="4"/>
  <text x="954" y="380" font-family="'Courier New', monospace" font-size="18" font-weight="800">7. RENDER MODEL</text>
  <text x="954" y="410" font-family="'Courier New', monospace" font-size="14" font-weight="700">UI-ready view model</text>

  <rect x="180" y="540" width="310" height="120" fill="#f2f2f2" stroke="#000000" stroke-width="4"/>
  <text x="204" y="590" font-family="'Courier New', monospace" font-size="18" font-weight="800">8. UI OUTPUT</text>
  <text x="204" y="620" font-family="'Courier New', monospace" font-size="14" font-weight="700">portfolio screen</text>

  <rect x="560" y="540" width="310" height="120" fill="#f2f2f2" stroke="#000000" stroke-width="4"/>
  <text x="584" y="590" font-family="'Courier New', monospace" font-size="18" font-weight="800">9. MARKDOWN OUTPUT</text>
  <text x="584" y="620" font-family="'Courier New', monospace" font-size="14" font-weight="700">README export modal</text>

  <rect x="940" y="540" width="320" height="120" fill="#000000" stroke="#000000" stroke-width="4"/>
  <text x="964" y="590" font-family="'Courier New', monospace" font-size="18" font-weight="800" fill="#ffffff">10. USER ACTION</text>
  <text x="964" y="620" font-family="'Courier New', monospace" font-size="14" font-weight="700" fill="#ffffff">copy / share / iterate</text>

  <g stroke="#000000" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M310 195H360"/>
    <path d="M610 195H660"/>
    <path d="M910 195H960"/>
    <path d="M1110 250V330"/>
    <path d="M930 390H860"/>
    <path d="M540 390H470"/>
    <path d="M330 450V540"/>
    <path d="M700 450V540"/>
    <path d="M1095 450V540"/>
    <path d="M490 600H560"/>
    <path d="M870 600H940"/>
  </g>
</svg>