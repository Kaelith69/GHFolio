<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">GH.FOLIO Component Diagram</title>
  <desc id="desc">Internal components and module interactions of the GH.FOLIO single-page application.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#000000"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="#ffffff"/>
  <rect x="40" y="40" width="1320" height="740" fill="none" stroke="#000000" stroke-width="4"/>
  <text x="64" y="78" font-family="'Courier New', monospace" font-size="28" font-weight="900" fill="#000000">GH.FOLIO COMPONENT DIAGRAM</text>

  <rect x="90" y="130" width="1220" height="600" fill="none" stroke="#000000" stroke-width="4"/>
  <text x="112" y="164" font-family="'Courier New', monospace" font-size="20" font-weight="700">Single HTML + JS Runtime</text>

  <rect x="140" y="210" width="260" height="120" fill="#f2f2f2" stroke="#000000" stroke-width="4"/>
  <text x="162" y="260" font-family="'Courier New', monospace" font-size="18" font-weight="800">UI Layer</text>
  <text x="162" y="288" font-family="'Courier New', monospace" font-size="14" font-weight="700">screens + cards + modals</text>

  <rect x="450" y="210" width="260" height="120" fill="#f2f2f2" stroke="#000000" stroke-width="4"/>
  <text x="472" y="260" font-family="'Courier New', monospace" font-size="18" font-weight="800">State Store</text>
  <text x="472" y="288" font-family="'Courier New', monospace" font-size="14" font-weight="700">session + preferences</text>

  <rect x="760" y="210" width="260" height="120" fill="#f2f2f2" stroke="#000000" stroke-width="4"/>
  <text x="782" y="260" font-family="'Courier New', monospace" font-size="18" font-weight="800">Data Service</text>
  <text x="782" y="288" font-family="'Courier New', monospace" font-size="14" font-weight="700">fetch + retry + guard</text>

  <rect x="1070" y="210" width="190" height="120" fill="#ffe87a" stroke="#000000" stroke-width="4"/>
  <text x="1092" y="260" font-family="'Courier New', monospace" font-size="18" font-weight="800">GitHub API</text>
  <text x="1092" y="288" font-family="'Courier New', monospace" font-size="14" font-weight="700">external</text>

  <rect x="140" y="410" width="260" height="120" fill="#c7f5ff" stroke="#000000" stroke-width="4"/>
  <text x="162" y="460" font-family="'Courier New', monospace" font-size="18" font-weight="800">Theme Engine</text>
  <text x="162" y="488" font-family="'Courier New', monospace" font-size="14" font-weight="700">light/dark + accents</text>

  <rect x="450" y="410" width="260" height="120" fill="#c7f5ff" stroke="#000000" stroke-width="4"/>
  <text x="472" y="460" font-family="'Courier New', monospace" font-size="18" font-weight="800">Render Pipeline</text>
  <text x="472" y="488" font-family="'Courier New', monospace" font-size="14" font-weight="700">templates + diff updates</text>

  <rect x="760" y="410" width="260" height="120" fill="#c7f5ff" stroke="#000000" stroke-width="4"/>
  <text x="782" y="460" font-family="'Courier New', monospace" font-size="18" font-weight="800">Markdown Builder</text>
  <text x="782" y="488" font-family="'Courier New', monospace" font-size="14" font-weight="700">README generation</text>

  <rect x="1070" y="410" width="190" height="120" fill="#c7f5ff" stroke="#000000" stroke-width="4"/>
  <text x="1092" y="460" font-family="'Courier New', monospace" font-size="18" font-weight="800">Export Utils</text>
  <text x="1092" y="488" font-family="'Courier New', monospace" font-size="14" font-weight="700">copy + share</text>

  <rect x="140" y="610" width="430" height="80" fill="#000000" stroke="#000000" stroke-width="4"/>
  <text x="162" y="660" font-family="'Courier New', monospace" font-size="20" font-weight="800" fill="#ffffff">Interface: DOM Events</text>

  <rect x="620" y="610" width="320" height="80" fill="#000000" stroke="#000000" stroke-width="4"/>
  <text x="642" y="660" font-family="'Courier New', monospace" font-size="20" font-weight="800" fill="#ffffff">Interface: JSON Schema</text>

  <rect x="980" y="610" width="280" height="80" fill="#000000" stroke="#000000" stroke-width="4"/>
  <text x="1002" y="660" font-family="'Courier New', monospace" font-size="20" font-weight="800" fill="#ffffff">Interface: Markdown</text>

  <g stroke="#000000" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M400 270H450"/>
    <path d="M710 270H760"/>
    <path d="M1020 270H1070"/>
    <path d="M580 330V410"/>
    <path d="M890 330V410"/>
    <path d="M270 530V610"/>
    <path d="M580 530V610"/>
    <path d="M890 530V610"/>
    <path d="M1020 470H1070"/>
  </g>
</svg>